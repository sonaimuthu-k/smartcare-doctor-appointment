<!DOCTYPE html>
<html>
<head>

<title>Doctor Availability</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#eef3f8;
font-family:Arial;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Navbar */

.navbar{
background:#1976D2;
}

/* Main section */

.main{
flex:1;
padding:40px;
}

/* Slot grid */

.slot-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

/* Slot button */

.slot-btn{
width:120px;
height:50px;
border:none;
border-radius:8px;
font-weight:bold;
font-size:15px;
}

/* Available slot */

.available{
background:#2E7D32;
color:white;
}

/* Booked slot */

.booked{
background:#D32F2F;
color:white;
cursor:not-allowed;
}

/* Footer */

.footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Mayvel Healthcare</a>

<div>

<a class="text-white me-3" href="/">Home</a>
<a class="text-white me-3" href="/appointment">Appointment</a>
<a class="text-white" href="/contact">Contact</a>

</div>

</div>

</nav>


<!-- Main Section -->

<div class="main">

<h2 class="text-center">{{doctor.name}} Availability</h2>

<div class="slot-grid">

{% for s in slots %}

{% if s in booked %}

<button class="slot-btn booked">
{{s}} Full
</button>

{% else %}

<a href="{{ url_for('book', doctor=doctor.name, time=s) }}">

<button class="slot-btn available">
{{s}} Book
</button>

</a>

{% endif %}

{% endfor %}

</div>

</div>


<!-- Footer -->

<div class="footer">
© 2026 Mayvel Healthcare Services
</div>

</body>
</html>
