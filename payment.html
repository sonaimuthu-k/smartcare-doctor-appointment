<!DOCTYPE html>
<html>
<head>

<title>Consultation Payment</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#eef3f8;
font-family:Arial;
min-height:100vh;
display:flex;
flex-direction:column;
}

.navbar{background:#1976D2;}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.payment-card{
background:white;
padding:40px;
border-radius:12px;
width:450px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.fee{
font-size:22px;
color:#2E7D32;
font-weight:bold;
}

.btn-pay{
background:#2E7D32;
color:white;
width:100%;
font-size:18px;
}

.footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Mayvel Healthcare</a>

<div>

<a class="text-white me-3" href="/">Home</a>
<a class="text-white me-3" href="/appointment">Appointment</a>
<a class="text-white" href="/contact">Contact</a>

</div>

</div>

</nav>


<div class="main">

<div class="payment-card">

<h3 class="text-center mb-4">Consultation Payment</h3>

<p><b>Doctor:</b> {{doctor}}</p>
<p><b>Appointment Time:</b> {{time}}</p>
<p><b>Date:</b> {{date}}</p>

<p class="fee">Consultation Fee: ₹500</p>

<hr>

<form method="POST" action="/confirm">

<input type="hidden" name="doctor" value="{{doctor}}">
<input type="hidden" name="time" value="{{time}}">
<input type="hidden" name="date" value="{{date}}">
<input type="hidden" name="name" value="{{name}}">
<input type="hidden" name="gender" value="{{gender}}">
<input type="hidden" name="email" value="{{email}}">
<input type="hidden" name="phone" value="{{phone}}">

<button class="btn btn-pay">
Pay ₹500
</button>

</form>

</div>

</div>

<div class="footer">
© 2026 Mayvel Healthcare Services
</div>

</body>
</html>
